<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0C0F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>ARTHA</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body,#app{height:100%;overflow:hidden;background:#0C0F14;color:#D4D0C8;font-family:'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.root{height:100%;display:flex;flex-direction:column}
.hdr{padding:12px 16px;border-bottom:1px solid rgba(201,165,92,.12);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#12161D,#0C0F14);flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px}
.ico{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#C9A55C,#8B6914);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0C0F14;font-family:'Cormorant Garamond',serif}
.ttl{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:#C9A55C;letter-spacing:.05em}
.sub{font-size:9px;color:rgba(201,165,92,.45);letter-spacing:.15em;text-transform:uppercase}
.nbtn{background:rgba(201,165,92,.08);border:1px solid rgba(201,165,92,.18);color:#C9A55C;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px}
.chat{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-thumb{background:rgba(201,165,92,.15);border-radius:2px}
.home{max-width:680px;margin:0 auto}
.wlc{text-align:center;padding:28px 0 16px}
.wh1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#C9A55C;margin-bottom:5px}
.wdesc{color:rgba(212,208,200,.45);font-size:12px;max-width:380px;margin:0 auto;line-height:1.5}
.acts{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px;padding:10px 0}
.abtn{background:rgba(201,165,92,.05);border:1px solid rgba(201,165,92,.1);border-radius:9px;padding:12px 10px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:5px;-webkit-tap-highlight-color:transparent}
.abtn:active{background:rgba(201,165,92,.15)}
.ae{font-size:19px}.al{color:#D4D0C8;font-size:11px;font-weight:600}
.hint{text-align:center;padding:12px 0;color:rgba(212,208,200,.2);font-size:10px}
.mw{max-width:700px;margin:0 auto 10px;display:flex}
.mw.u{justify-content:flex-end}.mw.a{justify-content:flex-start}
.mb{font-size:13px;line-height:1.6;overflow-wrap:break-word;word-break:break-word}
.mb.u{max-width:85%;padding:9px 14px;border-radius:14px 14px 3px 14px;background:linear-gradient(135deg,rgba(201,165,92,.18),rgba(201,165,92,.08));border:1px solid rgba(201,165,92,.22)}
.mb.a{max-width:95%;padding:12px 16px;border-radius:14px 14px 14px 3px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
.mb.a h2,.mb.a h3,.mb.a h4{color:#C9A55C}.mb.a h3{margin:14px 0 5px;font-size:1em;border-bottom:1px solid rgba(201,165,92,.15);padding-bottom:3px}
.mb.a h4{margin:12px 0 4px;font-size:.93em}.mb.a strong{color:#C9A55C}
.mb.a code{background:rgba(201,165,92,.1);padding:1px 4px;border-radius:3px;color:#C9A55C;font-size:.88em}
.mb.a hr{border:none;border-top:1px solid rgba(201,165,92,.12);margin:10px 0}
.li{padding:2px 0 2px 14px;border-left:2px solid rgba(201,165,92,.18);margin:1px 0 1px 4px}
.tw{overflow-x:auto;margin:8px 0}
.mb.a table{width:100%;border-collapse:collapse;font-size:.83em}
.mb.a th{padding:7px 10px;border-bottom:2px solid #C9A55C;text-align:left;color:#C9A55C;font-weight:600;white-space:nowrap}
.mb.a td{padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
.mb.a tr:nth-child(even){background:rgba(201,165,92,.04)}
.ld{display:flex;gap:5px;align-items:center;padding:12px 16px;border-radius:14px 14px 14px 3px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
.ld span{color:#C9A55C;font-size:12px}
.dot{width:4px;height:4px;border-radius:50%;background:#C9A55C;display:inline-block;animation:p 1.2s ease infinite}
.dot:nth-child(3){animation-delay:.2s}.dot:nth-child(4){animation-delay:.4s}
@keyframes p{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.1)}}
.ibar{padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid rgba(201,165,92,.08);background:#0E1117;flex-shrink:0}
.iwrap{max-width:700px;margin:0 auto;display:flex;gap:7px;align-items:flex-end}
.iwrap textarea{flex:1;background:rgba(255,255,255,.035);border:1px solid rgba(201,165,92,.12);border-radius:11px;padding:11px 14px;color:#D4D0C8;font-size:13px;font-family:inherit;resize:none;outline:none;max-height:110px;line-height:1.5}
.iwrap textarea:focus{border-color:rgba(201,165,92,.3)}
.sbtn{width:42px;height:42px;border-radius:11px;border:none;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;cursor:pointer}
.sbtn.on{background:linear-gradient(135deg,#C9A55C,#A88532);color:#0C0F14}
.sbtn.off{background:rgba(201,165,92,.08);color:rgba(201,165,92,.25);cursor:default}
.disc{text-align:center;font-size:9px;color:rgba(212,208,200,.18);margin-top:5px}
@media(max-width:480px){.acts{grid-template-columns:repeat(3,1fr);gap:6px}.abtn{padding:10px 8px}.mb.a{max-width:100%;padding:10px 12px}}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const SYS=`You are ARTHA \u2014 an AI Indian Wealth Intelligence System. You combine: CA (taxation), SEBI-style wealth manager, risk analyst, macro strategist, compliance assistant. Operate strictly within Indian law.

RULES: Never generic. Show math. Declare assumptions. Recommend CA validation. Prioritize downside protection. Challenge emotional decisions. Think probabilistically.

TAX (AY 2025-26 defaults \u2014 verify via web search):
Old: 0-2.5L nil, 2.5-5L 5%, 5-10L 20%, 10L+ 30%. Deductions: 80C(1.5L), 80CCD1B(50K), 80D(25K/50K), 24b(2L), Std Ded 50K.
New: 0-3L nil, 3-7L 5%, 7-10L 10%, 10-12L 15%, 12-15L 20%, 15L+ 30%. Std ded 75K.
Surcharge: 50L-1Cr 10%, 1-2Cr 15%, 2-5Cr 25%, 5Cr+ 37%old/25%new. Cess 4%.
87A Rebate: Old\u2014up to 5L taxable, 12500 rebate. New\u2014up to 7L, 25000 rebate.
STCG equity 20% (Sec 111A). LTCG equity 12.5% above 1.25L (Sec 112A). Crypto 30% flat (Sec 115BBH), no set-off, no carry forward.
Debt MF post April 2023: taxed at slab rate regardless of holding period.
Always compare old vs new regime side-by-side. Show effective rates. Mention documentation needed.

CAPITAL GAINS: Listed equity >12mo=LTCG. Real estate >24mo=LTCG. Gold >24mo physical, >12mo ETF. Sec 54/54F/54EC for reinvestment exemptions.
Set-off: STCL against STCG+LTCG. LTCL against LTCG only. Carry forward 8 years.

SCORING: FSS(0-100): emergency fund, DTI, insurance adequacy, income stability, surplus ratio, tax compliance, liability quality.
PRS(0-100): equity concentration, allocation drift, illiquidity, drawdown exposure, debt quality, crypto exposure.

MODES: Capital Acceleration(FSS>75,PRS<50), Structured Growth(FSS>60,PRS 30-60), Risk Balanced(FSS 40-70), Capital Defense(FSS<50 or PRS>70), Liquidity Priority, Tactical Opportunistic.

BEHAVIORAL GUARD: Detect and challenge panic selling, FOMO, recency bias, anchoring, overconfidence, loss aversion, herding, mental accounting.

EVERY RECOMMENDATION: Rationale, Tax impact (computed in Rs), Risk level, Liquidity impact, Exit conditions, Regulatory reference (section + date), Assumptions.

Use web search for: live stock/index prices, MF NAVs, gold rates, regulatory updates, budget amendments. Present cleanly with tables. Be direct and specific.

INSURANCE: Term life minimum 10-15x income. Health minimum 10L base + super top-up. Section 80D limits.
ENTITY: Individual, HUF(separate PAN, own 80C), LLP, Pvt Ltd. Clubbing Sec 64. Gifts Sec 56(2)(x).
ESTATE: Will, nomination vs legal heir, digital asset succession, trust structures.

Disclaimer when appropriate: "This is for informational purposes. Consult a SEBI-registered advisor and CA before acting."`;

const QA=[
  {e:"\u{1F4CA}",l:"Stock Price",p:"Get current price, PE, 52W range, and key metrics for "},
  {e:"\u{1F4C8}",l:"MF NAV",p:"Get latest NAV, category, and 1/3/5 year returns for "},
  {e:"\u{1F3E6}",l:"Tax Calc",p:"Calculate my income tax for FY 2024-25 comparing old vs new regime. My gross salary is Rs "},
  {e:"\u2696\uFE0F",l:"Old vs New",p:"Compare old vs new tax regime side-by-side for salary of Rs "},
  {e:"\u{1F4B0}",l:"Cap Gains",p:"Calculate capital gains tax. I bought listed equity shares at Rs "},
  {e:"\u{1FA99}",l:"Gold Price",p:"What is the current gold price in India per 10g for 24K and 22K?"},
  {e:"\u{1F4C9}",l:"Nifty/Sensex",p:"Current Nifty 50, Sensex, Bank Nifty levels with day change?"},
  {e:"\u{1F510}",l:"Crypto Tax",p:"Calculate crypto tax under Section 115BBH. I bought crypto at Rs "},
  {e:"\u{1F6E1}\uFE0F",l:"Risk Score",p:"Calculate my FSS and PRS scores. My profile: "},
  {e:"\u{1F4F0}",l:"News",p:"What are today's key Indian market news and any recent SEBI/RBI/CBDT circulars?"},
  {e:"\u{1F3AF}",l:"Goal Plan",p:"Help me plan for this financial goal: "},
  {e:"\u{1F4CB}",l:"Profile",p:"I want to set up my complete financial profile for ARTHA. Walk me through every field systematically."},
];

function App(){
  const[msgs,setMsgs]=useState([]);
  const[inp,setInp]=useState("");
  const[busy,setBusy]=useState(false);
  const[home,setHome]=useState(true);
  const[apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem("artha_key")||"";}catch(e){return "";}});
  const[showSettings,setShowSettings]=useState(false);
  const[keyInput,setKeyInput]=useState("");
  const end=useRef(null);
  const ta=useRef(null);

  useEffect(()=>{end.current?.scrollIntoView({behavior:"smooth"});},[msgs,busy]);

  const saveKey=()=>{
    const k=keyInput.trim();
    if(!k)return;
    setApiKey(k);setShowSettings(false);
    try{localStorage.setItem("artha_key",k);}catch(e){}
  };

  const send=async(text)=>{
    if(!text.trim()||busy)return;
    if(!apiKey){setShowSettings(true);setKeyInput("");return;}
    const um={role:"user",content:text.trim()};
    const all=[...msgs,um];
    setMsgs(all);setInp("");setHome(false);setBusy(true);
    if(ta.current)ta.current.style.height="auto";
    try{
      // Build Gemini conversation history
      const contents=all.map(m=>({
        role:m.role==="assistant"?"model":"user",
        parts:[{text:m.content}]
      }));
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          system_instruction:{parts:[{text:SYS}]},
          contents,
          tools:[{google_search:{}}],
          generationConfig:{maxOutputTokens:4096,temperature:0.7}
        }),
      });
      const d=await r.json();
      if(d.error){setMsgs([...all,{role:"assistant",content:"Error: "+d.error.message+(d.error.status?" ("+d.error.status+")":"")}]);}
      else{
        const parts=d.candidates?.[0]?.content?.parts||[];
        const t=parts.filter(p=>p.text).map(p=>p.text).join("\n")||"No response received.";
        setMsgs([...all,{role:"assistant",content:t}]);
      }
    }catch(e){setMsgs([...all,{role:"assistant",content:"Connection error: "+e.message}]);}
    setBusy(false);
  };

  const act=(a)=>{
    if(a.p.endsWith(" ")){setInp(a.p);setTimeout(()=>ta.current?.focus(),50);}
    else send(a.p);
  };

  const inl=(s)=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code>$1</code>');

  const render=(text)=>{
    const lines=text.split("\n"),out=[];
    let tR=[],inT=false;
    const flush=(k)=>{
      if(tR.length<2){tR=[];return;}
      out.push(<div key={k} className="tw"><table>
        <thead><tr>{tR[0].map((c,j)=><th key={j} dangerouslySetInnerHTML={{__html:inl(c)}}/>)}</tr></thead>
        <tbody>{tR.slice(1).map((r,ri)=><tr key={ri}>{r.map((c,j)=>
          <td key={j} dangerouslySetInnerHTML={{__html:inl(c)}}/>)}</tr>)}</tbody>
      </table></div>);
      tR=[];
    };
    for(let i=0;i<lines.length;i++){
      const ln=lines[i];
      if(ln.startsWith("|")&&ln.endsWith("|")){
        if(!inT)inT=true;
        if(!/^\|[\s\-:|]+\|$/.test(ln))
          tR.push(ln.split("|").filter(c=>c!=="").map(c=>c.trim()));
        continue;
      }
      if(inT){inT=false;flush("t"+i);}
      if(ln.startsWith("### "))out.push(<h4 key={i}>{ln.slice(4)}</h4>);
      else if(ln.startsWith("## "))out.push(<h3 key={i}>{ln.slice(3)}</h3>);
      else if(ln.startsWith("# "))out.push(<h2 key={i}>{ln.slice(2)}</h2>);
      else if(ln.startsWith("- ")||ln.startsWith("* "))
        out.push(<div key={i} className="li" dangerouslySetInnerHTML={{__html:inl(ln.slice(2))}}/>);
      else if(/^\d+\.\s/.test(ln))
        out.push(<div key={i} style={{padding:"2px 0 2px 8px"}} dangerouslySetInnerHTML={{__html:inl(ln)}}/>);
      else if(ln.startsWith("---"))out.push(<hr key={i}/>);
      else if(ln.trim()==="")out.push(<div key={i} style={{height:6}}/>);
      else out.push(<p key={i} style={{margin:"2px 0"}} dangerouslySetInnerHTML={{__html:inl(ln)}}/>);
    }
    if(inT)flush("tf");
    return out;
  };

  const ok=inp.trim()&&!busy;

  return(<div className="root">
    <div className="hdr">
      <div className="logo"><div className="ico">A</div>
        <div><div className="ttl">ARTHA</div><div className="sub">Wealth Intelligence</div></div>
      </div>
      {msgs.length>0&&<button className="nbtn" onClick={()=>{setMsgs([]);setHome(true);setInp("");}}>New</button>}
      <button className="nbtn" onClick={()=>{setShowSettings(true);setKeyInput(apiKey);}} style={{marginLeft:msgs.length?6:0}}>{apiKey?"\u2699":"Free API Key"}</button>
    </div>

    {showSettings&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:99,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowSettings(false)}>
      <div style={{background:"#181C24",border:"1px solid rgba(201,165,92,.2)",borderRadius:14,padding:24,maxWidth:420,width:"100%"}} onClick={e=>e.stopPropagation()}>
        <h3 style={{color:"#C9A55C",marginBottom:4,fontSize:16,fontFamily:"'Cormorant Garamond',serif"}}>API Key Setup (Free)</h3>
        <p style={{color:"rgba(212,208,200,.5)",fontSize:12,marginBottom:16,lineHeight:1.5}}>
          Get your free key from <b style={{color:"#C9A55C"}}>aistudio.google.com/apikey</b> → Create API Key. No credit card needed. Your key stays on your device only.
        </p>
        <input type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter")saveKey();}}
          placeholder="AIzaSy..."
          style={{width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(201,165,92,.2)",borderRadius:8,padding:"11px 14px",color:"#D4D0C8",fontSize:13,fontFamily:"monospace",outline:"none",marginBottom:12}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={saveKey} style={{flex:1,background:"linear-gradient(135deg,#C9A55C,#A88532)",color:"#0C0F14",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:600,fontSize:13}}>Save</button>
          <button onClick={()=>setShowSettings(false)} style={{flex:1,background:"rgba(255,255,255,.05)",color:"#D4D0C8",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"10px",cursor:"pointer",fontSize:13}}>Cancel</button>
        </div>
        {apiKey&&<button onClick={()=>{setApiKey("");setKeyInput("");try{localStorage.removeItem("artha_key");}catch(e){}}} style={{width:"100%",marginTop:8,background:"none",border:"1px solid rgba(255,80,80,.3)",color:"rgba(255,80,80,.7)",borderRadius:8,padding:"8px",cursor:"pointer",fontSize:11}}>Remove Saved Key</button>}
      </div>
    </div>}

    <div className="chat">
      {home&&msgs.length===0&&<div className="home">
        <div className="wlc"><div className="wh1">Welcome to ARTHA</div>
          <div className="wdesc">Your private Indian wealth intelligence system. Tax computation, portfolio analysis, live market data, and regulatory compliance — one desk for everything.</div>
        </div>
        <div className="acts">{QA.map((a,i)=><button key={i} className="abtn" onClick={()=>act(a)}>
          <span className="ae">{a.e}</span><span className="al">{a.l}</span></button>)}
        </div>
        <div className="hint">Tap an action or type any financial query below</div>
        {!apiKey&&<div style={{textAlign:"center",padding:"10px 16px",background:"rgba(201,165,92,.08)",borderRadius:10,margin:"8px auto",maxWidth:400}}>
          <p style={{color:"#C9A55C",fontSize:12,marginBottom:8}}>Get your free API key from Google AI Studio to start</p>
          <button onClick={()=>{setShowSettings(true);setKeyInput("");}} style={{background:"linear-gradient(135deg,#C9A55C,#A88532)",color:"#0C0F14",border:"none",borderRadius:7,padding:"8px 20px",cursor:"pointer",fontWeight:600,fontSize:12}}>Set Free API Key</button>
        </div>}
      </div>}

      {msgs.map((m,i)=><div key={i} className={"mw "+(m.role==="user"?"u":"a")}>
        <div className={"mb "+(m.role==="user"?"u":"a")}>
          {m.role==="assistant"?render(m.content):m.content}
        </div>
      </div>)}

      {busy&&<div className="mw a"><div className="ld">
        <span>Analyzing</span><div className="dot"/><div className="dot"/><div className="dot"/>
      </div></div>}
      <div ref={end}/>
    </div>

    <div className="ibar"><div className="iwrap">
      <textarea ref={ta} value={inp} rows={1}
        onChange={e=>{setInp(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,110)+"px";}}
        onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(inp);}}}
        placeholder="Ask about taxes, stocks, portfolio, regulations..."/>
      <button className={"sbtn "+(ok?"on":"off")} onClick={()=>send(inp)} disabled={!ok}>{"\u2191"}</button>
    </div>
    <div className="disc">Not financial advice. Powered by Gemini + Google Search. Verify with SEBI-registered advisor & CA.</div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(r=>console.log('SW registered')).catch(e=>console.log('SW failed',e));
}
</script>
</body>
</html>
