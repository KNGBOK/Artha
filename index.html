// ── TAX CONSTANTS (AY 2025-26) ───────────────────────────
const OLD_SLABS = [[250000,0],[500000,.05],[1000000,.2],[Infinity,.3]];
const NEW_SLABS = [[300000,0],[700000,.05],[1000000,.1],[1200000,.15],[1500000,.2],[Infinity,.3]];
const SURCHARGE = [[5e6,0],[1e7,.1],[2e7,.15],[5e7,.25],[Infinity,.37]];
const CESS = 0.04;

function slabTax(inc, slabs) {
  let tax=0, prev=0;
  for (const [lim,rate] of slabs) {
    if (inc<=prev) break;
    tax += (Math.min(inc,lim)-prev)*rate;
    prev=lim;
  }
  return Math.round(tax);
}

function surcharge(tax, inc, isNew=false) {
  let rate=0;
  for (const [lim,r] of SURCHARGE) { if (inc<=lim){rate=r;break;} rate=r; }
  if (isNew) rate = Math.min(rate, 0.25);
  return Math.round(tax*rate);
}

function computeTax(salary, hp=0, biz=0, other=0, ded80c=0, ded80ccd=0, ded80d=0, hra=0, hloan=0, stcg=0, ltcg=0) {
  const cgTax = Math.max(0,stcg)*0.2 + Math.max(0, ltcg-125000)*0.125;
  // OLD
  const sdO=salary>0?50000:0;
  const gtiO=Math.max(0, salary-sdO-Math.min(hra,salary*0.5)+hp-Math.min(hloan,200000)+biz+other);
  const dedO=Math.min(ded80c,150000)+Math.min(ded80ccd,50000)+ded80d;
  const tiO=Math.max(0, gtiO-dedO);
  const txO=slabTax(tiO, OLD_SLABS);
  const rbO=tiO<=500000?Math.min(txO,12500):0;
  const netO=txO-rbO+cgTax;
  const scO=surcharge(netO, tiO+stcg+ltcg);
  const cessO=Math.round((netO+scO)*CESS);
  const totO=Math.round(netO+scO+cessO);
  const effO=tiO+stcg+ltcg>0?Math.round(totO/(tiO+stcg+ltcg)*10000)/100:0;
  // NEW
  const sdN=salary>0?75000:0;
  const tiN=Math.max(0, salary-sdN+hp+biz+other);
  const txN=slabTax(tiN, NEW_SLABS);
  const rbN=tiN<=700000?Math.min(txN,25000):0;
  const netN=txN-rbN+cgTax;
  const scN=surcharge(netN, tiN+stcg+ltcg, true);
  const cessN=Math.round((netN+scN)*CESS);
  const totN=Math.round(netN+scN+cessN);
  const effN=tiN+stcg+ltcg>0?Math.round(totN/(tiN+stcg+ltcg)*10000)/100:0;
  return {
    old:{taxable:tiO,ded:dedO,slabTax:txO,rebate:rbO,cgTax:Math.round(cgTax),surcharge:scO,cess:cessO,total:totO,rate:effO},
    new:{taxable:tiN,stdDed:sdN,slabTax:txN,rebate:rbN,cgTax:Math.round(cgTax),surcharge:scN,cess:cessN,total:totN,rate:effN},
    best:totO<totN?"OLD":"NEW", saving:Math.abs(totO-totN)
  };
}

function computeAdvanceTax(total) {
  if (total<=10000) return null;
  return [
    {due:"15 Jun",pct:"15%",amt:Math.round(total*0.15)},
    {due:"15 Sep",pct:"45%",amt:Math.round(total*0.45)},
    {due:"15 Dec",pct:"75%",amt:Math.round(total*0.75)},
    {due:"15 Mar",pct:"100%",amt:total},
  ];
}

function computeSIP(monthly, years, returnPct) {
  const r=returnPct/100/12;
  const n=years*12;
  const fv=monthly*(((1+r)**n-1)/r)*(1+r);
  const invested=monthly*n;
  return {fv:Math.round(fv),invested,gains:Math.round(fv-invested)};
}

function computeFSS(p) {
  let s=0;
  const ef=parseFloat(p.emergencyMonths||0);
  s+=ef>=12?14:ef>=6?11:ef>=3?6:Math.round(ef*2);
  const inc=parseFloat(p.monthlyIncome||1);
  const sur=parseFloat(p.monthlySurplus||0);
  s+=inc>0&&sur/inc>=.4?14:inc>0&&sur/inc>=.2?10:5;
  const emi=parseFloat(p.monthlyEMI||0);
  s+=inc>0&&emi/inc<.1?14:inc>0&&emi/inc<.3?10:4;
  const tc=parseFloat(p.termCover||0);
  const ai=parseFloat(p.annualIncome||1);
  s+=ai>0&&tc/ai>=15?14:ai>0&&tc/ai>=10?10:4;
  s+={government:14,mnc:13,private:11,business:8,freelance:5}[p.incomeSource]||7;
  s+=p.taxCompliant==="yes"?9:4;
  s+={none:14,secured:12,mixed:7,unsecured:3}[p.liabilityQuality]||7;
  return Math.min(100,s);
}

const STRESS={
  "2008 Crisis":{eq:-.57,dt:0,gd:.2,re:-.25,cr:-.75},
  "2020 COVID":{eq:-.38,dt:.01,gd:.15,re:-.12,cr:-.45},
  "Stagflation":{eq:-.25,dt:-.08,gd:.25,re:-.08,cr:-.4},

};

const rs = n => n==null?"—":`₹${Math.abs(n).toLocaleString("en-IN")}`;
const rss = n => n<0?`-${rs(n)}`:rs(n);

// ── TAX CALCULATOR ───────────────────────────────────────
function TaxCalc() {
  const [f,setF]=useState({salary:"",hp:"",biz:"",other:"",d80c:"",d80ccd:"",d80d:"",hra:"",hloan:"",stcg:"",ltcg:""});
  const [result,setResult]=useState(null);
  const u=(k,v)=>setF({...f,[k]:v});
  const calc=()=>{
    const r=computeTax(+f.salary||0,+f.hp||0,+f.biz||0,+f.other||0,+f.d80c||0,+f.d80ccd||0,+f.d80d||0,+f.hra||0,+f.hloan||0,+f.stcg||0,+f.ltcg||0);
    setResult(r);
  };
  const adv=result?computeAdvanceTax(Math.min(result.old.total,result.new.total)):null;
  return (<>
    <Card title="Income Tax Calculator (AY 2025-26)">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="Gross Salary" value={f.salary} onChange={v=>u("salary",v)} placeholder="e.g. 1500000"/>
        <Field label="Other Income" value={f.other} onChange={v=>u("other",v)}/>
        <Field label="House Property" value={f.hp} onChange={v=>u("hp",v)}/>
        <Field label="Business Income" value={f.biz} onChange={v=>u("biz",v)}/>
      </div>
      <h4 style={{color:"#C9A55C",fontSize:12,margin:"14px 0 8px",opacity:.7}}>Deductions (Old Regime)</h4>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="80C (max 1.5L)" value={f.d80c} onChange={v=>u("d80c",v)}/>
        <Field label="80CCD(1B) NPS (max 50K)" value={f.d80ccd} onChange={v=>u("d80ccd",v)}/>
        <Field label="80D Health (25K/50K)" value={f.d80d} onChange={v=>u("d80d",v)}/>
        <Field label="HRA Exemption" value={f.hra} onChange={v=>u("hra",v)}/>
        <Field label="Home Loan Interest 24(b)" value={f.hloan} onChange={v=>u("hloan",v)}/>
      </div>
      <h4 style={{color:"#C9A55C",fontSize:12,margin:"14px 0 8px",opacity:.7}}>Capital Gains (Optional)</h4>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="STCG (Equity)" value={f.stcg} onChange={v=>u("stcg",v)}/>
        <Field label="LTCG (Equity)" value={f.ltcg} onChange={v=>u("ltcg",v)}/>
      </div>
      <Btn onClick={calc} full>Calculate Tax</Btn>
    </Card>
    {result&&<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Card title="Old Regime">
          <Row label="Taxable Income" value={rs(result.old.taxable)}/>
          <Row label="Deductions Used" value={rs(result.old.ded)}/>
          <Row label="Slab Tax" value={rs(result.old.slabTax)}/>
          <Row label="Rebate 87A" value={rs(result.old.rebate)} green/>
          <Row label="CG Tax" value={rs(result.old.cgTax)}/>
          <Row label="Surcharge" value={rs(result.old.surcharge)}/>
          <Row label="Cess 4%" value={rs(result.old.cess)}/>
          <Row label="TOTAL TAX" value={rs(result.old.total)} bold/>
          <Row label="Effective Rate" value={result.old.rate+"%"}/>
        </Card>
        <Card title="New Regime">
          <Row label="Taxable Income" value={rs(result.new.taxable)}/>
          <Row label="Std Deduction" value={rs(result.new.stdDed)}/>
          <Row label="Slab Tax" value={rs(result.new.slabTax)}/>
          <Row label="Rebate 87A" value={rs(result.new.rebate)} green/>
          <Row label="CG Tax" value={rs(result.new.cgTax)}/>
          <Row label="Surcharge" value={rs(result.new.surcharge)}/>
          <Row label="Cess 4%" value={rs(result.new.cess)}/>
          <Row label="TOTAL TAX" value={rs(result.new.total)} bold/>

        </Card>

          <Badge text={`✓ ${result.best} REGIME saves ${rs(result.saving)}`} color="#4CAF50"/>
        </div>
      </Card>
      {adv&&<Card title="Advance Tax Schedule">
        {adv.map((a,i)=><Row key={i} label={`${a.due} (${a.pct})`} value={rs(a.amt)}/>)}
      </Card>}

  </>);
}

// ── CAPITAL GAINS ────────────────────────────────────────
function CapGains() {
  const [f,setF]=useState({buyVal:"",sellVal:"",holdDays:"",assetType:"equity"});
  const [r,setR]=useState(null);
  const u=(k,v)=>setF({...f,[k]:v});
  const calc=()=>{
    const buy=+f.buyVal||0, sell=+f.sellVal||0, days=+f.holdDays||0;
    const gain=sell-buy;
    const ltcgThreshold = f.assetType==="equity"?365:730;
    const isLTCG = days > ltcgThreshold;
    let tax=0, rate="", section="";
    if (f.assetType==="equity") {
      if (isLTCG) { const taxable=Math.max(0,gain-125000); tax=Math.round(taxable*0.125); rate="12.5%"; section="Sec 112A (LTCG >₹1.25L exempt)"; }
      else { tax=Math.round(Math.max(0,gain)*0.2); rate="20%"; section="Sec 111A (STCG)"; }
    } else if (f.assetType==="debt_mf") {
      tax=Math.round(Math.max(0,gain)*0.3); rate="Slab (~30%)"; section="Post Apr 2023: No LTCG benefit";
    } else {
      if (isLTCG) { tax=Math.round(Math.max(0,gain)*0.125); rate="12.5%"; section="LTCG (>24 months)"; }
      else { tax=Math.round(Math.max(0,gain)*0.2); rate="20%"; section="STCG"; }
    }
    const cess=Math.round(tax*0.04);
    setR({gain,isLTCG,tax,cess,total:tax+cess,rate,section,days});
  };
  return (<>
    <Card title="Capital Gains Tax Calculator">
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {[["equity","Equity/MF"],["gold_re","Gold/Real Estate"],["debt_mf","Debt MF"]].map(([v,l])=>
          <button key={v} onClick={()=>u("assetType",v)} style={{
            padding:"6px 14px",borderRadius:6,border:"1px solid",fontSize:11,fontWeight:600,cursor:"pointer",
            borderColor:f.assetType===v?"#C9A55C":"rgba(255,255,255,.1)",
            background:f.assetType===v?"rgba(201,165,92,.15)":"transparent",
            color:f.assetType===v?"#C9A55C":"rgba(212,208,200,.5)",
          }}>{l}</button>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="Total Buy Value (₹)" value={f.buyVal} onChange={v=>u("buyVal",v)}/>
        <Field label="Total Sell Value (₹)" value={f.sellVal} onChange={v=>u("sellVal",v)}/>
        <Field label="Holding Period (days)" value={f.holdDays} onChange={v=>u("holdDays",v)}/>
      </div>
      <Btn onClick={calc} full>Calculate</Btn>
    </Card>
    {r&&<Card>
      <Row label="Gain/Loss" value={rss(r.gain)} green={r.gain>0} red={r.gain<0}/>
      <Row label="Type" value={r.isLTCG?"LTCG":"STCG"}/>
      <Row label="Tax Rate" value={r.rate}/>
      <Row label="Tax" value={rs(r.tax)}/>
      <Row label="Cess 4%" value={rs(r.cess)}/>
      <Row label="Total Tax" value={rs(r.total)} bold/>
      <div style={{marginTop:8,fontSize:11,color:"rgba(201,165,92,.6)"}}>{r.section}</div>
      {r.isLTCG && r.gain>0 && <div style={{marginTop:6,fontSize:11,color:"rgba(212,208,200,.4)"}}>
        Tip: Sec 54/54F exemption available if reinvested in residential property within 2 years
      </div>}
    </Card>}
  </>);
}

// ── SIP CALCULATOR ───────────────────────────────────────
function SIPCalc() {
  const [monthly,setMonthly]=useState("10000");
  const [years,setYears]=useState("10");
  const [ret,setRet]=useState("12");
  const r = computeSIP(+monthly||0, +years||1, +ret||0);
  return (
    <Card title="SIP Calculator">
      <Field label="Monthly SIP (₹)" value={monthly} onChange={setMonthly}/>
      <Field label="Years" value={years} onChange={setYears}/>
      <Field label="Expected Return (%)" value={ret} onChange={setRet}/>
      <div style={{marginTop:16}}>
        <Row label="Total Invested" value={rs(r.invested)}/>
        <Row label="Wealth Gained" value={rs(r.gains)} green/>
        <Row label="Future Value" value={rs(r.fv)} bold/>
      </div>
      <div style={{marginTop:12,height:24,borderRadius:6,overflow:"hidden",display:"flex"}}>
        <div style={{width:`${r.invested/r.fv*100}%`,background:"rgba(201,165,92,.3)"}}/>

      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"rgba(212,208,200,.4)",marginTop:4}}>
        <span>Invested ({Math.round(r.invested/r.fv*100)}%)</span>

  );
}

// ── PORTFOLIO TRACKER ────────────────────────────────────
function Portfolio({holdings,setHoldings}) {
  const [show,setShow]=useState(false);
  const [f,setF]=useState({name:"",cls:"equity_stocks",qty:"",buyPrice:"",currentPrice:"",buyDate:""});
  const u=(k,v)=>setF({...f,[k]:v});
  const add=()=>{
    if(!f.name||!f.qty||!f.buyPrice) return;
    setHoldings([...holdings,{...f,qty:+f.qty,buyPrice:+f.buyPrice,currentPrice:+f.currentPrice||+f.buyPrice,id:Date.now()}]);
    setF({name:"",cls:"equity_stocks",qty:"",buyPrice:"",currentPrice:"",buyDate:""});
    setShow(false);
  };
  const rm=(id)=>setHoldings(holdings.filter(h=>h.id!==id));
  const total=holdings.reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0);
  const invested=holdings.reduce((s,h)=>s+h.qty*h.buyPrice,0);
  const gl=total-invested;
  const alloc={};
  holdings.forEach(h=>{const v=h.qty*(h.currentPrice||h.buyPrice);alloc[h.cls]=(alloc[h.cls]||0)+v;});

  return (<>
    <Card title="Portfolio Tracker">
      {holdings.length>0?<>
        <Row label="Total Value" value={rs(total)} bold/>
        <Row label="Invested" value={rs(invested)}/>
        <Row label="P&L" value={rss(gl)} green={gl>=0} red={gl<0}/>
        <Row label="Return" value={invested>0?`${(gl/invested*100).toFixed(1)}%`:"—"} green={gl>=0} red={gl<0}/>
      </>:<div style={{textAlign:"center",padding:"20px 0",color:"rgba(212,208,200,.3)",fontSize:12}}>No holdings yet. Add your first investment below.</div>}
    </Card>
    {Object.keys(alloc).length>0&&<Card title="Allocation">
      {Object.entries(alloc).sort((a,b)=>b[1]-a[1]).map(([cls,val])=>(
        <div key={cls} style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
            <span style={{color:"rgba(212,208,200,.6)"}}>{cls.replace("_"," ")}</span>
            <span style={{color:"#C9A55C"}}>{rs(val)} ({(val/total*100).toFixed(1)}%)</span>
          </div>
          <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,.05)",overflow:"hidden"}}>
            <div style={{width:`${val/total*100}%`,height:"100%",background:"#C9A55C",borderRadius:3}}/>
          </div>
        </div>
      ))}
    </Card>}
    {holdings.map(h=>{
      const cv=h.qty*(h.currentPrice||h.buyPrice);
      const iv=h.qty*h.buyPrice;
      const pnl=cv-iv;
      return(<Card key={h.id}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:600,fontSize:13}}>{h.name}</div>
            <div style={{fontSize:11,color:"rgba(212,208,200,.4)"}}>{h.cls.replace("_"," ")} • {h.qty} units @ {rs(h.buyPrice)}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:13,fontWeight:600}}>{rs(cv)}</div>
            <div style={{fontSize:11,color:pnl>=0?"#4CAF50":"#EF5350"}}>{rss(pnl)} ({(pnl/iv*100).toFixed(1)}%)</div>
          </div>
        </div>
        <button onClick={()=>rm(h.id)} style={{marginTop:6,background:"none",border:"none",color:"rgba(255,80,80,.5)",fontSize:10,cursor:"pointer"}}>Remove</button>
      </Card>);
    })}
    {show?<Card title="Add Holding">
      <Field label="Name/Ticker" value={f.name} onChange={v=>u("name",v)} type="text" placeholder="e.g. RELIANCE"/>
      <div style={{marginBottom:10}}>
        <label style={{fontSize:11,color:"rgba(212,208,200,.5)",display:"block",marginBottom:3}}>Asset Class</label>
        <select value={f.cls} onChange={e=>u("cls",e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(201,165,92,.15)",borderRadius:8,padding:"9px 12px",color:"#D4D0C8",fontSize:13}}>
          {["equity_stocks","equity_mf","debt_fd","debt_mf","gold","real_estate","ppf_epf_nps","crypto","other"].map(c=>
            <option key={c} value={c}>{c.replace(/_/g," ")}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="Quantity/Units" value={f.qty} onChange={v=>u("qty",v)}/>
        <Field label="Buy Price (₹)" value={f.buyPrice} onChange={v=>u("buyPrice",v)}/>
        <Field label="Current Price (₹)" value={f.currentPrice} onChange={v=>u("currentPrice",v)}/>
        <Field label="Buy Date" value={f.buyDate} onChange={v=>u("buyDate",v)} type="date"/>
      </div>
      <div style={{display:"flex",gap:8}}><Btn onClick={add}>Add</Btn><Btn onClick={()=>setShow(false)} secondary>Cancel</Btn></div>
    </Card>:<Btn onClick={()=>setShow(true)} full>+ Add Holding</Btn>}
  </>);
}

// ── RISK SCORE ───────────────────────────────────────────
function RiskScore({profile,setProfile,holdings}) {
  const u=(k,v)=>setProfile({...profile,[k]:v});
  const fss=computeFSS(profile);
  const eqPct=holdings.length>0?holdings.filter(h=>h.cls?.includes("equity")).reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0)/Math.max(1,holdings.reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0))*100:0;
  const prs=Math.min(100,Math.round(eqPct>80?40:eqPct>60?28:eqPct>40?16:0));
  const mode=fss>75&&prs<50?"CAPITAL ACCELERATION":fss>60&&prs<=60?"STRUCTURED GROWTH":fss<50||prs>70?"CAPITAL DEFENSE":"RISK BALANCED";
  const fssLabel=fss>80?"Excellent":fss>60?"Good":fss>40?"Needs Attention":"Critical";
  const prsLabel=prs<30?"Conservative":prs<50?"Balanced":prs<70?"Aggressive":"Very High Risk";
  return (<>
    <Card title="Financial Profile">
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Field label="Monthly Income (₹)" value={profile.monthlyIncome||""} onChange={v=>u("monthlyIncome",v)}/>
        <Field label="Monthly Surplus (₹)" value={profile.monthlySurplus||""} onChange={v=>u("monthlySurplus",v)}/>
        <Field label="Monthly EMI (₹)" value={profile.monthlyEMI||""} onChange={v=>u("monthlyEMI",v)}/>
        <Field label="Emergency Fund (months)" value={profile.emergencyMonths||""} onChange={v=>u("emergencyMonths",v)}/>
        <Field label="Annual Income (₹)" value={profile.annualIncome||""} onChange={v=>u("annualIncome",v)}/>
        <Field label="Term Cover (₹)" value={profile.termCover||""} onChange={v=>u("termCover",v)}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <div style={{marginBottom:10}}>
          <label style={{fontSize:11,color:"rgba(212,208,200,.5)",display:"block",marginBottom:3}}>Income Source</label>
          <select value={profile.incomeSource||""} onChange={e=>u("incomeSource",e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(201,165,92,.15)",borderRadius:8,padding:"9px 12px",color:"#D4D0C8",fontSize:13}}>
            <option value="">Select</option>
            {["government","mnc","private","business","freelance"].map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        <div style={{marginBottom:10}}>
          <label style={{fontSize:11,color:"rgba(212,208,200,.5)",display:"block",marginBottom:3}}>Tax Compliant?</label>
          <select value={profile.taxCompliant||""} onChange={e=>u("taxCompliant",e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(201,165,92,.15)",borderRadius:8,padding:"9px 12px",color:"#D4D0C8",fontSize:13}}>
            <option value="">Select</option><option value="yes">Yes</option><option value="no">No</option>
          </select>
        </div>
      </div>
    </Card>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Card>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:36,fontWeight:700,color:"#C9A55C"}}>{fss}</div>
          <div style={{fontSize:11,color:"rgba(212,208,200,.4)"}}>FSS / 100</div>
          <Badge text={fssLabel} color={fss>60?"#4CAF50":fss>40?"#FFA726":"#EF5350"}/>
        </div>
      </Card>
      <Card>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:36,fontWeight:700,color:"#C9A55C"}}>{prs}</div>
          <div style={{fontSize:11,color:"rgba(212,208,200,.4)"}}>PRS / 100</div>
          <Badge text={prsLabel} color={prs<50?"#4CAF50":prs<70?"#FFA726":"#EF5350"}/>
        </div>
      </Card>
    </div>
    <Card><div style={{textAlign:"center"}}><Badge text={`Mode: ${mode}`}/></div></Card>
  </>);
}

// ── STRESS TEST ──────────────────────────────────────────
function StressTest({holdings}) {
  const total=holdings.reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0);
  if (total===0) return <Card><div style={{textAlign:"center",padding:20,color:"rgba(212,208,200,.3)",fontSize:12}}>Add holdings in Portfolio tab first</div></Card>;
  const eq=holdings.filter(h=>h.cls?.includes("equity")).reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0);
  const dt=holdings.filter(h=>h.cls?.includes("debt")).reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0);
  const gd=holdings.filter(h=>h.cls==="gold").reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0);
  const re=holdings.filter(h=>h.cls==="real_estate").reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0);
  const cr=holdings.filter(h=>h.cls==="crypto").reduce((s,h)=>s+h.qty*(h.currentPrice||h.buyPrice),0);
  return (<>
    <Card title={`Stress Test — Portfolio: ${rs(total)}`}>
      {Object.entries(STRESS).map(([name,sc])=>{
        const after=eq*(1+sc.eq)+dt*(1+sc.dt)+gd*(1+sc.gd)+re*(1+sc.re)+cr*(1+sc.cr);
        const loss=after-total;
        const pct=((loss/total)*100).toFixed(1);
        return <div key={name} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:600}}>{name}</span>
            <span style={{fontSize:12,color:"#EF5350",fontWeight:600}}>{rss(Math.round(loss))} ({pct}%)</span>
          </div>
          <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,.05)",overflow:"hidden"}}>
            <div style={{width:`${Math.max(5,100+parseFloat(pct))}%`,height:"100%",background:parseFloat(pct)>-20?"#FFA726":"#EF5350",borderRadius:3}}/>
          </div>
        </div>;
      })}
    </Card>
  </>);
}

// ── CRYPTO TAX ───────────────────────────────────────────
function CryptoTax() {
  const [buy,setBuy]=useState("");
  const [sell,setSell]=useState("");
  const gain=(+sell||0)-(+buy||0);
  const tax=Math.round(Math.max(0,gain)*0.3);
  const cess=Math.round(tax*0.04);
  const tds=Math.round((+sell||0)*0.01);
  return (
    <Card title="Crypto Tax — Section 115BBH">
      <Field label="Total Buy Value (₹)" value={buy} onChange={setBuy}/>
      <Field label="Total Sell Value (₹)" value={sell} onChange={setSell}/>
      {(+buy>0||+sell>0)&&<div style={{marginTop:12}}>
        <Row label="Gain/Loss" value={rss(gain)} green={gain>0} red={gain<0}/>
        <Row label="Tax @ 30%" value={rs(tax)}/>
        <Row label="Cess @ 4%" value={rs(cess)}/>
        <Row label="Total Tax" value={rs(tax+cess)} bold/>
        <Row label="TDS @ 1% (Sec 194S)" value={rs(tds)}/>
        <div style={{marginTop:10,fontSize:11,color:"rgba(201,165,92,.5)",lineHeight:1.5}}>
          ⚠ No set-off allowed against any income. No carry forward of losses. No deduction except cost of acquisition. Flat 30% regardless of holding period.
        </div>
      </div>}
    </Card>
  );
}
